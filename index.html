<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets (9).mind; maxTrack: 1" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="Fairy-1" src="img/Fairy/Fairy-1.png"> <img id="Fairy-2" src="img/Fairy/Fairy-2.png"> <img id="Fairy-3" src="img/Fairy/Fairy-3.png">
        <img id="Fighting-1" src="img/Fighting/Fighting-1.png"> <img id="Fighting-2" src="img/Fighting/Fighting-2.png"> <img id="Fighting-3" src="img/Fighting/Fighting-3.png">
        <img id="Psychic-1" src="img/Psychic/Psychic-1.png"> <img id="Psychic-2" src="img/Psychic/Psychic-2.png"> <img id="Psychic-3" src="img/Psychic/Psychic-3.png">
        <img id="Water-1" src="img/Water/Water-1.png"> <img id="Water-2" src="img/Water/Water-2.png"> <img id="Water-3" src="img/Water/Water-3.png">
        <img id="Grass-1" src="img/Grass/Grass-1.png"> <img id="Grass-2" src="img/Grass/Grass-2.png"> <img id="Grass-3" src="img/Grass/Grass-3.png">
        <img id="Colorless-1" src="img/Colorless/Colorless-1.png"> <img id="Colorless-2" src="img/Colorless/Colorless-2.png"> <img id="Colorless-3" src="img/Colorless/Colorless-3.png">
        <img id="Electric-1" src="img/Electric/Electric-1.png"> <img id="Electric-2" src="img/Electric/Electric-2.png"> <img id="Electric-3" src="img/Electric/Electric-3.png">
        <img id="Steel-1" src="img/Steel/Steel-1.png"> <img id="Steel-2" src="img/Steel/Steel-2.png"> <img id="Steel-3" src="img/Steel/Steel-3.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0"><a-image id="album-0" height="0.66" width="1"></a-image></a-entity>
      <a-entity mindar-image-target="targetIndex: 1"><a-image id="album-1" height="0.66" width="1"></a-image></a-entity>
      <a-entity mindar-image-target="targetIndex: 2"><a-image id="album-2" height="0.66" width="1"></a-image></a-entity>
      <a-entity mindar-image-target="targetIndex: 3"><a-image id="album-3" height="0.66" width="1"></a-image></a-entity>
      <a-entity mindar-image-target="targetIndex: 4"><a-image id="album-4" height="0.66" width="1"></a-image></a-entity>
      <a-entity mindar-image-target="targetIndex: 5"><a-image id="album-5" height="0.66" width="1"></a-image></a-entity>
      <a-entity mindar-image-target="targetIndex: 6"><a-image id="album-6" height="0.66" width="1"></a-image></a-entity>
      <a-entity mindar-image-target="targetIndex: 7"><a-image id="album-7" height="0.66" width="1"></a-image></a-entity>

    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const albums = {
          0: ["#Fairy-1", "#Fairy-2", "#Fairy-3"],
          1: ["#Fighting-1", "#Fighting-2", "#Fighting-3"],
          2: ["#Psychic-1", "#Psychic-2", "#Psychic-3"],
          3: ["#Water-1", "#Water-2", "#Water-3"],
          4: ["#Grass-1", "#Grass-2", "#Grass-3"],
          5: ["#Colorless-1", "#Colorless-2", "#Colorless-3"],
          6: ["#Electric-1", "#Electric-2", "#Electric-3"],
          7: ["#Steel-1", "#Steel-2", "#Steel-3"]
        };

        let currentIndex = 0;

        // Set initial images
        Object.keys(albums).forEach(id => {
          const el = document.querySelector(`#album-${id}`);
          if(el) el.setAttribute("src", albums[id][0]);
        });

        // 1-second interval for energetic cycling
        setInterval(() => {
          currentIndex = (currentIndex + 1) % 3; 
          Object.keys(albums).forEach(id => {
            const el = document.querySelector(`#album-${id}`);
            if (el) el.setAttribute("src", albums[id][currentIndex]);
          });
        }, 1000);
      });
    </script>
  </body>
</html>
