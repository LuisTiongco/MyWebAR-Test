<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <img id="pic1" src="./test1.jpg">
        <img id="pic2" src="./test2.jpg">
        <img id="pic3" src="./test3.jpg">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-image id="slideshow-display" src="#pic1" position="0 0 0" scale="1 1 1"></a-image>
      </a-entity>
    </a-scene>

    <script>
      const images = ['#pic1', '#pic2', '#pic3'];
      let currentIndex = 0;
      const display = document.querySelector('#slideshow-display');
      let slideshowInterval;

      const scene = document.querySelector('a-scene');

      // Start cycling when the card is found
      scene.addEventListener("targetFound", () => {
        slideshowInterval = setInterval(() => {
          currentIndex = (currentIndex + 1) % images.length;
          display.setAttribute('src', images[currentIndex]);
        }, 3000); // Changes image every 3 seconds
      });

      // Stop cycling when the camera loses the card to save battery/resources
      scene.addEventListener("targetLost", () => {
        clearInterval(slideshowInterval);
      });
    </script>
  </body>
</html>
